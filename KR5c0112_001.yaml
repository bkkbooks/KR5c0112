front:
  text: 道德真經集義大㫖圖序卷上染一谷神圖
  hash: sha256:0852de94c392e743e8f4bb88f7249977805d71b9b6c43d58432e2c0369b10dd8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0112_HFL_001-001a, image: hfl/0431/0431-004.png}
body:
  text: 谷神者五臟所藏之神也解此義者甚多或指玄牝以為心或指谷神以為心皆非也要知神者即五臟之神精不竭氣不虧則神有所養而不死形之顔貌而有光矣三十輻圖道生一圖姑即人言之其萬物皆同此少者男女少年也中者男女中年也長者男女長年也死不得其正則其氣蕩而我不歸於二氣混元之內也出生入死圖道生德畜圖道生我德畜我物形我勢成我之妙也太虛肇一圖虛無大道肇生一氣凝為混沌內含三才三才既分上下奠位非因感觸自然而生故曰虛無自然道本於虛而三生萬物以應日用無窮極也九天生神圖青黃白各生三天三三成九天九天各生三天三九二十七天合上金火土三宫九天共三十六天開天元置品經云玄元始氣遍備身光三氣化形而演三洞始為青光上生於天元為白光中生於人玄為黃光下生於地元始於此三色合生九光遍起法身光明洞焕今詳三清所生從三色中便分三寶皆原一氣所衍所以太虛筆一一氣分三建立三清氣色形象故三清謂之自然非父非母非陰非陽禀自然之氣而生三極之後太上老君歷劫應化示相於天上人間或託胞胎其本從三氣分光為三清也九色寶光始生混混為蒼光混生洞洞為赤光洞生浩浩為青光元生昊昊為緑光昊生景景為黃光景生遁遁為白光玄生融融為紫光融生炎炎為碧光炎生演演為為光又從此分東華南極西靈北真四天每天生八天即太皇黃曾等天是也四八三十二天為三界也合上四天共三十六天大羅中羅合七十二以應天地之數七十二候合上九天成八十一太玄方州部家取此數也四始圖土得五數乃本數也又土得四數兼水之一共為五土應坤爻分為十二亦曰一氣故開光一十二人以包為始應心為用圖王真人訣想二十八宿周遍形體以輔七政依此法數之宿凡十三度存想象一年之有閏計兩度交互數之一十二處皆存兩宿惟心存四宿共二十八此無他正指道生玄鄉應心為用故摽四中主始於虛宿道生一圖天之所以列三辰命萬物皆有道也道無終始而生於玄鄉按二十八宿子當虛宿一氣反於黃宫復而後散散而後生萬物皆受命於此也故虛無是道道生於虛無以天論之虛在玄鄉窈冥之地道生一也二十八舍有虛宿焉十二宫分有寶瓶焉言統元氣也素問以在天為玄在地為牝在人為道以雷復於震故也玄牝圖天門開闔守雌圖道一也一變三而為乾乾陽也乾互體而變坤陰陽消長變化于兹巳亥相交乾坤自合雄不離雌天之道也人能體之與道同用十生死生死陰陽不離五行有子午九木亥午丑未八水甲卯五行不離生死三生土同皆存於十有三死寅申七金巳子卯酉六火寅酉三也以數定之圖四九七六故無差矣十有三攝生無死圖太上曰水火比於道之真體不可暫離可離而獲存者非物非人此義猶以世間水火比之也夫真水真火坎離相配抽添有則運用及時則此十三徒非同前之十三生死也故曰以其無死地道德階梯之圖道有二道德有三德一者虛無無為之道二者一氣有為之道故道有二道而分淺深一氣之道又謂之至德自至德已下皆屬有為故為三德以分內外此皆正道法門夫道德陰陽人事四者融通合為一家若不能和會則觸途成滯學者宜審詳之道德真經集義諸家姓氏河上公漢人作注王輔嗣魏人諱弼作注唐明皇玄宗大聖大明孝皇帝開元癸亥御注并疏杜光庭后蜀廣德先生天復辛酉作廣聖義宋道君徽宗體神合道駿烈遜功聖文仁德憲慈顯孝皇帝御注王介甫宋太傅荆國文公諱安石字介甫作注蘇潁濱宋太中大夫門下侍郎諱轍字子由元符庚辰作注吕吉甫宋觀文殿學士醴泉觀使諱惠卿作解陸農師宋中大夫知毫州諱佃作解王元澤宋龍圖直學士左諫議大夫臨川伯諱雱作解劉仲平宋臣作解劉巨濟宋職方郎中諱涇作解丞相新說見八注中不載其名劉驥號清源子紹興丙寅作解趙實庵沖真寶元大師浮山玉虛觀住待賜紫字明舉諱道升紹興壬申作解邵若愚號本來子紹興己卯作解王志然號見獨大師乾道己丑作解程泰之宋吏部尚書龍圖閣學士文簡公諱大昌乾道己丑作易老通言黃茂材宋知荆門軍事淳熙甲午作解朱紫陽宋太師徽國文公諱熹字元晦慶元乙卯有楚辭辨證及語録詹秋圃宋儒林諱節號漫叟作解白玉蟾號紫清老人解廖粹然號希夷大師作解陳碧虛諱景元號碧虛子乙未造解謝圖南宋朝散大夫號蓮山天飴子淳祐丙午作注林慮齊宋翰林學士號竹溪諱希逸景定辛酉作口義范應元南嶽壽寧觀主號果山無隱齊谷神子作解徐君約宋鄂州諸軍料院諱權景定壬戌解第一章薛庸齊諱玄大元河南路提學作解休休庵號蒙山絶牧叟名德異至元戊寅作解牛妙傳通真大師前成部府萬壽宫知官提舉號澄明子至元庚辰作或問褚伯秀古杭道士作解喻清中寶慶府教授元乙酉作解楊智仁號無物子至元丁亥作解胥六虛諱元一號六虛散人至元辛卯作解李是從特賜純粹先生號谷神子造解元貞乙未刻本已上三十六家係全解削煩編次張沖應玉清上相諱明道寶祐癸丑造解張靈應諱亞宋封神文聖武孝德忠仁王造或問已上兩家係鸞筆蘇敬靜前文林郎渾州糧料院宋開慶進士寂靜蘇起翁本一庵居士柴元臯吳環中已上四家係續補什法師肇法師陸希聲司馬溫公太平光師圓師秉文葉氏已上八家係集注中所引淮南子司馬談司馬遷嚴君平韓康伯孫登阮籍阮咸郭璞梁簡文傳奕陸德明成玄英李若愚張君相楊孚應吉父張玄靜馬誕郭雲董遇陳韶李竒王尚張嗣王誗已上二十六家係范應元所引關尹子列子莊子文子韓非子已上五家係旁證贊老子大哉混元超乎形氣先天地生而生天地五千玄文立教垂世萬劫長存道尊德貴老子序說凝遠大師常德路玄妙觀提點觀事月屋劉惟永編集前朝奉大夫行太府寺簿兼樞密院編修官石潭丁易東校正史記世家節文曰老子者楚苦縣厲鄉曲仁里人也姓李氏名耳字伯陽諡曰聃周守藏室之史也孔子適周將問禮於老子老子曰子所言者其人與骨皆已朽矣獨其言在耳且君子得其時則駕不得其時則蓬纍而行吾聞之良賈深藏若虛君子盛德容貌若愚吾所以告子若是而已孔子去謂弟子曰鳥吾知其能飛魚吾知其能游獸吾知其能走走者可以為網游者可以為綸飛者可以為矰至於龍吾不能知其乘風雲而上天吾今日見老子其猶龍邪老子修道德其學以自隱無名為務居周久之見周之衰乃遂去至關關令尹喜曰子將隱矣彊為我著書於是老子乃著書上下篇言道德之意五千餘言而去莫知其所終下文曰蓋老子百有六十餘歲或言二百餘歲以其修道而養壽也自孔子死之後百二十九年而史記周太史儋見秦獻公曰始秦與周合而離離五百歲而復合合七十歲而霸王者出焉或曰儋即老子或曰非也世莫知其然否老子隱君子也老子之子名宗宗為魏將封於段干宗子注注子宫宫玄孫假假仕於漢孝文帝而假之子解為膠西王卬太傅因家于齊焉世之學老子者則絀儒學儒學亦絀老子道不同不相為謀豈謂是邪葛仙翁序老子體自然而然生乎太無之先起乎無因經歷天地終始不可稱載終乎無終窮乎無窮極乎無極故無極也與大道而倫化為天地而立根布氣於十方抱道德之至淳浩浩蕩蕩不可名也焕乎其有文章巍巍乎其有成功淵乎其不可量堂堂乎為神明之宗三光持以朗照天地禀以得生乾坤運以吐精高而無民貴而無位覆載無窮是教八方諸天普弘大道開闢以前復下為國師代代不休人莫能知之匠成萬物不言我為玄之德也故衆聖所共尊道尊德貴夫莫之命而常自然惟老氏乎周時復託神李母剖左腋而生生即皓然號曰老子老子之號因玄而出在天地之先無衰老之期故曰老子世人謂老子當始於周代老子之號始於無數之劫甚窈窈冥冥眇邈久遠矣世衰大道不行西遊天下關令尹喜曰大道將隱乎願為我著書於是作道德二篇五千文上下經焉夫五千文宣道德之源大無不包細無不入天人之自然經也余先師有言精進研之則聲參太極高上遙唱諸天歡樂則携契玄人靜思期真則衆妙感會內觀形影則神氣長存體洽道德則萬神震伏禍滅九陰福生十方安國寧家孰能知乎無為之文汙之不辱飾之不榮撓之不濁澄之不清自然也應道而見傳教無窮常者也故知常曰明大道何為哉弘之由人斯文尊妙可不極精乎粗述一篇唯有道者寶之焉此段未為純粹以其行之既久姑存之唐明皇御製序老子者太上玄元皇帝之內號也玄玄道宗降生伊毫肅肅皇祖命氏我唐垂裕之訓無疆之祉長發遠祥系本瓜瓞其出處之迹方册備記道家以為玉晨應號馬遷謂之隱君子而仲尼師之翻經中其大縵問禮歎乎龍德是孔丘無間然矣在周室久之將開導西極關令尹喜請著書於是演二篇焉明道德生畜之源罔不盡此其要在乎理身理國理國則絶矜尚華薄以無為不言為教理身則少私寡欲以虛心實腹為務比其大㫖可得而言也及乎窮理盡性閉緣息想處實行權坐忘遺照損之又損玄之又玄此殆不可得而言傳者矣其教圓其文約其㫖暢其言通故遊其廊廡者皆自以為升堂睹奧及其研精覃思然後知其於秋毫之端萬分未得其一也經曰有物混成先天地生吾不知其名字之曰道强為之名曰大故知大道者虛極妙本之强名語其通生也莊子曰太初有無有無者言有比妙無也又曰無有無名無名者未立强名也故經曰無名天地之始强名通生曰道故經曰有名萬物之母又莊子曰物得以生謂之德德得也言天地萬變旁通品物皆資妙本而以生成得生為德故經曰道生之德畜之則知道者德之體德者道之用也而經分上下者先明道而德次之也然體用之名可散也體用之實不可散也故經曰同出而異名同謂之玄語其出則分而為二咨其同則混而為一故曰可散而不可散也則上經曰是謂玄德又曰孔德之容又曰德者同於德又曰常德不離下經曰失道而後德又曰反者道之動又曰道生一又曰大道甚夷是知體用互陳遞明精要不必定名於上下也經徑也又常也言通徑常行之道也每惟聖祖垂訓貽厥孫謀聽理之餘伏勤講讀今復一二詮疏其要妙者書不盡言粗舉大綱以裨助學者爾杜光庭序珠韜玉札云太上老君降跡行教遠近有四其一歷劫禀形隨方演化即千二百號百八十名散在諸經可得徵驗矣其二此劫開皇之始運道之功孕育乾坤胞胎日月為造化之本為天地之根播氣分光生成品彙自五太之首逮殷商之前為帝王師代代應見即鬱華緑圖廣成尹壽因機表號是也三皇迭往五帝不歸雲紀龍師時遷數革鳥官火運川逝風移步驟不同澆淳漸變雖揖讓斯在而干戈屢興阪泉有剪戮之師丹浦有專征之旅智詐行而大朴隱仁愛顯而孝慈生玄默希夷日以寖薄陶唐以耄期厭位虞舜以歷試登庸憂軫萬方服勤庶政老君號尹壽子居于河陽以道德真經降授於舜經之㫖也道以無為居先德以有稱居次亦由三皇之書言大道也五帝之書言常道也其下薄裁非義節兼愛之仁損俯仰之禮挫銛巧之智斥用兵之暴抑譎詐之謀使人復朴還淳以無為無事為理舜須力而行之竄凶舉相明目達聰敦睦九族平章百姓而恬和清淨之道莫能致也故禹湯之後天下為家各親其親各子其子大道既隱玄化不流禮樂滋繁政刑大用矣其三老君以殷湯甲之代降神寓胎武丁之年誕生於亳即今真源縣九龍井太清宫是其地也或隱或顯潜化萬方當周昭王癸丑之年以此二經授關令尹喜傳於天下世得而聞焉其四將化流沙與尹喜期會於西蜀青羊之肆示現降生即昭王丁巳之年也此道德經自函關所授纍代尊行哲后明君鴻儒碩學詮疏箋注六十餘家則有節解上下老君與尹喜解內解上下尹喜以內修之㫖解注想爾二卷三天法師張道陵所注河上公章句漢文帝時降居陜州河濱今有廟存嚴君平指歸十四卷漢武帝時蜀人名遵山陽王弼注字輔嗣魏時為尚書郎南陽何晏字平叔魏駙馬都尉河南郭象字子玄向秀弟子魏晋時人潁川鍾會字士季魏明帝時人隱士孫登字公和魏文明帝時人晋僕射太山羊祜字叔子注為四卷沙門羅什本西胡人符堅時自玉門關入中國注二卷沙門佛圖澄後趙時西國胡僧也注上下二卷沙門僧肇晋時人注四卷梁隱居陶弘景武帝時人真白先生注四卷范陽盧裕後魏國子博士一名白頭翁注二卷草萊臣劉仁會後魏伊州梁縣人注二卷吳郡徵士顧歡字景怡南齊博士注四卷松靈仙人隱青溪山無名氏年代晋人河東裴楚恩注二卷秦人京兆杜弼注二卷宋人河南張憑字長宗明帝太常博士注四卷梁武帝蕭衍注道德經四卷證以因果為義梁簡文帝蕭綱作道德述義十卷清河張嗣注四卷不知年代梁道士臧玄靜字道宗作疏四卷梁道士孟安排號大孟作經義二卷梁道士孟智周號小孟注五卷梁道士竇略注四卷與武帝羅什所宗無異陳道士諸糅作玄覽六卷隋道士劉進喜作疏六卷隋道士李播注上下二卷唐太史令傅奕注一卷并作音義唐嵩山道士魏徵作要義五卷為太宗丞相法師宋文明作義泉五卷仙人胡超作義疏十卷西山得道道士安丘作指歸五卷道士尹文操作簡要義五卷法師韋録字處玄注兼義四卷道士王玄辨作河公釋義十卷諫議大夫肅明觀主尹愔作新義十五卷道士徐邈注四卷直翰林道士何思遠作指趣二卷玄示八卷衡嶽道士薛季昌作金繩十卷事數一卷洪源先生王鞮注二卷玄珠二卷口訣二卷法師趙堅作講疏六卷太子司議郎楊上善高宗時人作道德集注真言二十卷吏部侍郎賈至作述義十一卷及金鈕一卷道士車弼作疏七卷任真子李榮注上下二卷成都道士黎元興作注義四卷太原少尹通義郡道士任太玄注二卷道士沖虛先生殿中監申甫作疏五卷岷山道士張君相作集解四卷道士成玄英作講疏六卷漢州刺史王真作論兵述義上下二卷道士符少明作道譜縈二卷玄宗皇帝所注道德上下二卷講疏六卷太原少尹王光庭作契源注二卷道士張慧超作志玄疏四卷龔法師作集解四卷即今所廣疏矣所釋之理諸家不同或深了重玄不滯空有或溺椎因果偏執三生或引合儒宗或趣歸虛寂莫不並探驪室竟掇珠璣俱陟鍾山爭窺圭瓚連城在握照我盈懷敷弘則光粲縑緗演暢則彩交編簡語內修則八瓊玉雪氛靄於丹田九轉琅膏晶熒於絳闕盡六氣回環之妙臻五靈夾輔之功忘之於心息之於踵得無所得而了達化元矣語品證也則擺落細塵超登上秩遊八外而放曠指三境而躋升蹈太一之任矣而總內外之要兼人天之能者未有其倫我玄宗至道昭肅孝皇帝降神龍變接統象先戡內難以乘乾啓中興而御極無為在宥四十五年汾水襄城靡勞轍迹具茨大隗自得朋遊廓八溟為仁壽之庭普萬㝢為華胥之國至道至德超哉明哉欽若尊經本朝家教象繫不足以擬議風雅不足以指陳橫亘古今獨立宇宙雖諸家染翰未窮衆妙之門多士研精莫造重玄之境凝旒多暇屬想有歸躬注八十一章製疏六卷內則循身之本囊括無遺外則理國之方洪纖畢舉宸藻遐布奪五雲之華天光焕臨增兩曜之色固可季仲十翼輝映二南若親禀於玄元信躬傳於太上冠九流而首出垂萬古而不刊則大風朱雁之歌誠難接武典論金樓之作詎可同年但以疏注之中引經合義周書魯史互有發明四始漆園或申屬類後學披卷多瞢本源輒探托衆書研尋篇軸隨有所見咸得備書纂成廣聖義三十卷大明在上而爝火不休巨澤溥天而灌浸未息誠不知量粗備闕文天復元年龍集辛酉九月十六日甲子序蘇潁濱序豫年四十有二謪居筠州筠雖小州而多古禪剎四方遊僧聚焉有道全者住黃蘖山南公之孫也行高而心通喜從豫遊嘗與豫談道豫告之曰子所談者豫於儒書已得之矣全曰此佛法也儒者何自得之豫曰不然豫忝聞道儒者之所無何苦强以誣之顧誠有之而世莫知耳儒佛之不相通如胡漢之不相諳也子亦何由知之全曰試為我言其略豫曰孔子之孫子思子思之書曰中庸中庸之言曰喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之達道也致中和天地位焉萬物育焉何以言之豫曰六祖有言不思善不思惡是汝本來面目自六祖以來人以此言悟入者大半矣所謂不思善不思惡則喜怒哀樂之未發也蓋中者佛性之異名而和者六度萬行之總目也致中極和而天地萬物生於其間此非佛法何以當之全驚喜曰吾初不知也今而後始知儒佛一法也豫笑曰不然天下固無二道而所以治人則異君臣父子之間非禮法則亂知禮法而不知道則世之俗儒不足貴也居山林木食澗飲而心存至道雖為人天師可也而以之治世則亂古之聖人中心行道而不毁世法然後可耳全作禮曰此至論也是時豫方解老子每出一章輒以示全全輒歎曰皆佛說也豫居筠五年而北歸全不久亦化去逮今二十餘年矣凡老子解亦時有所刊定未有不與佛法合者時人無可與語思復見全而示之故書之老子之末大觀二年十二月十日子由題豫昔南遷海康與子瞻兄邂逅於藤州相從十餘日語及平生舊學子瞻謂豫豫所作詩春秋傳古史三書皆古人所未至惟解老子差若不及豫至海康間居無事凡所為書多所更定乃再録老子書以寄子瞻自是蒙恩北歸子瞻至毗陵得疾不起逮今十餘年竟不知此書於子瞻為可否也政和元年冬得姪邁等所編先公手澤其一曰昨日子由寄老子新解讀之盡卷掩卷而歎使戰國有此書則無商鞅韓非使漢初有此書則孔老為一使晋宋間有此書則佛老不為二不意老年見此奇特然后知此書當子瞻意然豫自居潁川十年之間於此四書復多所删改以為聖人之言非一讀所能了故每有所得不敢以前說為定今日以益老自以為足矣欲復質之子瞻而不可得言乃於此涕泗而已趙實庵序混成之體冥於寂寥日用之功宗於氣母造形而上無無者俱隱而無下法而親有有者均而俱有善守則固無死地得一則洞化神機本自無親肖形者同夫不宰誰云有作造化者稟之自然以其行於萬物而為道不即不離有天下者號曰神器而不可執以其得於自己而為德或仁或義輔天下者貴夫清淨而不可撓道非難也簡易求之得於希夷之妙神變不測道非易也言默究之流於動靜之域真理全昧故有無二致可以同觀家國殊途宜乎一貫且二篇之義正標道德之宗九九分章爰象六陽之體練純陰於火鼎乾道以之混天下以無為聖主取則傳不云乎得道者上為皇而下為王失吾道者上見光而下為土了乎斯道莫匪以心鑿破真胎失之用巧夫既如是果何守耶恬淡寂寞不求而自至果何得耶征行作為不迎而自隨元古之君施行乎天下而不知有道道乃無為衰周之時善誘乎天下而道有不知義不能徙此吾師所以付授于尹君而莊列隨以廣明乎當世雖然仁義可以治世世之不治者惜乎仁義之不常道德可以鳴時時之浮僞者患乎道德之不講高明之道是故存於聖人中庸之言何嘗廢於斯㫖上經曰可道可名非吾之常道常名宜乎隱奧而難識若上仁上義分無為有為之理亦豈放蕩而不收蓋三皇善用終日兮不離五帝能承奉天而有别下世澆薄失之在人易曰乾以易知坤以簡能惟能行簡易之道乃合吾清淨之宗夫如是則治天下者安有治亂之名哉善乎蓋公之言曰治道貴清淨斯道德二篇之㫖所以作矣宋紹興壬申上元日玉蟾堂書黃茂材序老子之道將以乘雲氣上撓無極俯視乎八荒之外人間事物不足以嬰纍其心今其書頗說治國愛民用兵行師下而至於車輿器用之微蓋多寓言焉老莊一也知莊子之為寓言而不知其出於老子故讀老子者每失其㫖老子曰知其雄守其雌又曰谷神不死是謂玄牝又曰而貴求食於母夫老子何取於雌與牝與母哉皆寓言也八十一章之中如此類者不一乃欲合於孔孟六經之文宜乎其相悖也余覃思此經有年矣專探老子之意為之注解意有未盡則引列莊及易與夫道家之書庶幾鑿開混沌剖析鴻濛以示後學云爾謝圖南序道德有經其來尚矣青牛紫氣之未交玉𥫽金鑰之未啓也蓋已有五千言發先天之祕闡敷落之微玄而又玄神而又神非有道之士不足以知之老子八十一章言亦五千先後脉絡相與流通果皆自然之文椎而廣之則修身以治國治國以平天下而治道成矣引而伸之則修身以鍊神鍊神以飛升而仙道成矣張平叔詩云陰符寶字踰三百道德靈文止五千自古神仙無限數盡從此處悟真筌平叔豈欺我哉雖然筌者得魚之具經者入道之徑魚得則筌可以忘道悟則經不過寄焉而已誦古聖人之言而不達言外之意猶為無益也黃庭內經曰仙人道士非有神積精纍功以為真又曰積功成鍊非自然是由精誠亦由專學道君子心精專久而不替未有不成功特患尊之不至而慢易乘之信之不篤而怠忽繼之此所以閲千萬人而得者未一二也昔黃帝得陰符之㫖於廣成皇人至于泣謝關令尹子聞道德之妙於李老君為之泣拜何泣也驚喜之深而感激之至也然則是書豈易見是理豈易知吾儕今日當百拜而誦之終身而守之如獲至寶如愛元氣其毋忽諸其毋替諸淳祐丙午上元蓮山天飴子謝圖南南强再序于瓊臺喻清中序道之大原出於天天不能自言必待能言之人以宣之而道之體始呈露矣苟無能言之人則道終祕也夫天豈欲終祕斯道哉能言之人曠百世而不一見也若吾老氏其曠百世而僅一見者乎天以斯道而託諸老氏之身身者道之寄也道寄諸身而形諸言所以發天地之祕而泄造化之機於是乎有書書以紀言言以載道五千言皆道也實不離乎一散見於八十一章皆道也亦不外乎此一以其精者治心以其粗者治身以其土苴治天下國家皆自此一推之耳自專門之學興各是其是各非其非子雲有椎排之譏班固有慘刻之議遂使吾經終受屈儕之流異端之列殊不思三教之名雖殊三教之理則一昔蘇黃門注此書以寄東坡坡曰使戰國有此書則無商鞅韓非使漢初有此書則孔老為一使晋宋間有此書則佛老不為二是可以異端之學少之哉欽惟天朝尊崇聖教扶植人綱凡道家傳會之文秉畀炎火惟道德一經巋然獨存炳炳行世如日麗天豈非天耶鄭衛黜而韶益尊瓦礫窮而珠益見天之意蓋有在也天既不晦斯道於昔而復大顯斯道於今意欲是書家有而人得之人皆有是書而不能口是書曰是書而不能心是書書云書云言語云乎哉因言乃所以會意得意斯可以忘言古今誦說者幾人前後注釋者幾家皆未能忘言者也得於彼或失於此舉其粗或遺其精終未足以會一家之全而祛千古之惑僕竊嘗因其所已言發其所未言援證必據之經傳議論必根諸儒先目之曰道德經集義非敢求異於前人蓋天下之義理無窮愈求而愈有得要使老氏復生可無遺憾若夫僣躐之罪所不敢辭凡我同志紬而繹之必有夢寐青牛翁於千載之上者道德真經集義大㫖圖序卷上
