body:
  text: 凝遠大師常德路玄妙觀提點觀事月屋劉惟永編集前朝奉大夫行太府寺簿兼樞密院編修官石潭丁易東校正杜光庭將釋此經大分二段先明製疏後解正文今初述製疏之由者我大唐玄宗皇帝垂衣之暇鍾想妙門以大道為天地原根老君乃玄元聖祖二經敷演綿歷歲年説自舜朝傳於周代詮注疏解六十餘家言理國則嚴氏河公楊鏕自得述循身則松靈想爾逸軌難追其間梁武簡文僧肇羅什臧陶顧蓋霞舉於南朝任黎二張星羅於西蜀其餘祖述互有否臧未盡發揮孰窺堂奧以開元十一年躬為注解上來述製疏之由已竟向下人解正文於中大分為二一者先解疏題二者入文科判將釋下文約疏大科二段第一開章釋文總摽門中又分為二第一所詮之法即指道德二字也第二能詮之教即經之一字也解釋具在向下經題中當辨夫此道德二字者宣道德生畜之源理國理身之妙莫不盡此也昔葛玄仙公為吳主孫權曰道德經者乃天地之至妙有天道焉有人道焉有神道焉大無不包細無不入宜遵之焉就此門中大略宗意有三十八别第一教天子以無為理國經云絶聖棄智人利百倍絶仁棄義人復孝慈絶巧棄利盜賊無有又云愛人理國能無為乎又云我無為而人自化第二教天子修道於天下經云修之天下其德能普又云執古之道以御今之有又云執大象天下往第三教天子以道理國經云以道蒞天下其鬼不神非其鬼不神其神不傷人又云天下無道戎馬生於郊第四教天子無事法天經云人法地地法天又云道常無為而無不為侯王若能守萬物將自化第五教天子不以尊高輕天下經云貴以身為天下若可寄天下愛以身為天下若可託天下又云如何萬乘之主而以身輕天下輕則失臣躁則失君又云聖人不為大故能成其大第六教天子不尚賢不貴貨經云不尚賢使人不爭不貴難得之貨使人不為盜又云欲不欲不貴難得之貨第七教天子化人以無事無欲經云常使人無知無欲使夫知者不敢為也為無為則無不理矣又云我無事而人自富我無欲而人自朴又云不欲以靜天下將自正第八教天子等觀庶物不滯功名經云天地不仁以萬物為芻狗聖人不仁以百姓為芻狗又云行不言之教又云為而不恃功成不處第九教天子無執無滯經云為者敗之執者失之又云去甚去奢去泰又云聖人無常心以百姓心為心第十教天子以謙下為基經云貴以賤為本高以下為基又云江海所以能為百谷王者以其善下之又云受國之垢是謂社稷主受國不祥是為天下王又云大國宜為下又云善用人為下又云大國以下小國則取小國第十一教諸侯以正理國經云以正理國又云以智理國國之賊不以智理國國之福又云民之難理以其智多是以難理第十二教諸侯政無苛暴經云理大國若烹小鮮又云朝甚除田甚蕪倉甚虛又云其政察察其民缺缺第十三教諸侯以道佐天子不尚武功經云以道佐人主不以兵強天下又云兵強則不勝又云善勝敵不爭又云雖有甲兵無所陳之使人復結繩而用之又云兵者不祥之器不得已而用之又云善勝而不美第十四教諸侯守道化人經云古之善為士者微妙玄通又云其政悶悶其民淳淳第十五教諸侯不玩兵黷武經云用兵有言吾不敢為主而為客不敢進寸而退尺又云抗兵相加哀者勝又云禍莫大於輕敵又云善為士不武又云攘無臂執無兵又云不爭之德第十六教諸侯不尚淫奢輕繇薄賦以養於人經云民之飢以其上食稅之多是以飢又云民多伎巧奇物滋起第十七教諸侯權器不可以示人經云魚不可脫於淵國有利器不可以示人又云古之善為道者非以明民將以愚之第十八教理國修身尊行三寶經曰我有三寶保而持之一曰慈二曰儉三曰不敢為天下先第十九教人修身曲己則全守柔則勝經云曲則全又云柔勝剛弱勝強又云柔弱者生之徒又云剛強者死之徒又云強梁者不得其死第二十教人理身無為無欲經云常無欲觀其妙又云不見可欲使心不亂第二十一教人理身保道養氣以全其生經云致虛極守靜篤又云專氣致柔又云為腹不為目去彼取此又云知其白守其黑又云知其子守其母又云綿綿若存用之不勤第二十二教人理身崇善去惡經云天下皆知美之為美斯惡已皆知善之為善斯不善已又云常善救人而無棄人常善救物而無棄物又云善人不善人之師又云挫其鋭解其紛又云上善若水第二十三教人理身積德為本經云含德之厚又云上德若谷又云大丈夫處其厚不處其薄居其實不居其華又云君子終日行不離輜重第二十四教人理身勤志於道經云上士聞道勤而行之又云勇於不敢則活第二十五教人理身忘棄功名不耽俗學經云絶學無憂又云功成名遂身退又云功成不居又云為道日損又云名與身孰親第二十六教人理身不貪世利經云身與貨孰多得與亡孰病又云甚愛必大費多藏必厚亡又云難得之貨令人行妨第二十七教人理身外絶浮境不衒己能經云不自見故明不自伐故有功不自矜故長又云大辨若訥大巧若拙又云廣德若不足又云大音希聲又云自知者明自勝者強第三十八教人理身不務榮寵經云寵辱若驚又云持而盈之不如其已揣而鋭之不可長保又云富貴而驕自遺其咎第二十九教人理身寡知慎言經云知不知上不知知病又云多言數窮不如守中又云輕諾必寡信多易必多難又云塞其兊閉其門終身不勤第三十教出家之人道為俗反經云俗人昭昭我獨若昏俗人察察我獨悶悶又云明道若昧進道若退第三十一教出家養神則不死經云谷神不死是謂玄牝又云深根固蒂長生久視之道又云善建不拔善抱不脫第三十二教人體命善壽不亡經云死而不亡者壽第三十三教人修身外身而無為經云後其身而身先外其身而身存第三十四教人理心虛心而會道經云虛其心弱其志第三十五教人處世和光於物經云和其光同其塵又云大道泛兮其可左右又云被褐懷玉第三十六教人理棄絶除嗜欲畏慎謙光經云五色令人目盲五音令人耳聾五味令人口爽馳騁田獵令人心發狂又云民不畏威則大威至第三十七教人裒多益寡經云以有餘奉不足又云既以與人己愈有既以與人己愈多第三十八教人體道修身必獲其報經云陸行不遇兕虎入軍不被甲兵又云以其無死地舉此三十八别以明經之大意所詮之法然則此經大則包羅無外細則入於毫間豈止三十八門便盡其要為存教義泛舉大綱比之秋毫萬分未得其一也禮記云道也者不可須臾離也可離非道也若為君之無道德如瞻視之無兩目若為臣之無道德如胸腹之無五臟理家之無道德如尸僵而無氣由是論之道之於人不可闕矣其若離言教絶指陳玄之又玄妙之又妙斯可以神照不可以言傳道之極矣王元澤曰道一也而為説有二所謂二者何也則有無事也無則道之本而所謂妙者也有則道之末而所謂徼者也故道之本出乎沖虛杳眇之際而其末也散於形名度數之間是二者其為道一也而世之蔽者常以為異何也蓋沖虛杳眇者常存乎無而言形名度數者常存乎有有無不能以並存此其所以蔽而不得其全也夫無者名天地之始而有名者萬物之母此為名則異而未嘗不相為用也蓋有無者若東西之相反而不可以相無故非有則無以見無而無無則無以出有有無之變更出迭入而未嘗離乎道此則聖人之所謂神者矣易曰無思也無為也寂然不動感而遂通天下之故此之謂也蓋昔之聖人常以其無思無為以觀乎妙常以其感而遂通天下之故以觀其徼徼妙並得而無所偏取也則非神其孰能與於此哉然則聖人之道亦可見矣觀其妙所以窮神而觀乎徼所以知化窮神知化則天地之道豈有以復加乎雖然觀乎妙者惟以窮神而已而非所以為神也若夫神則未嘗離乎此二者而此二者亦不足以為名也故曰兩者同出而異名同者同出乎神而異者有無之異名也聖人者能體是以神明其德故存乎無則足以見妙而存乎有則足以知徼而卒離乎有無之名也其上則有以知天地之本而下焉則有以應萬物之始者凡以此鳴呼老子之言可謂協於易矣然而卒不能與孔孟並者何也蓋聖人之於道未嘗欲有所言也凡所以言者皆出於應天下之變而為中才之不知者言耳以其道雖有無並載而及其言也務詳於有而略於無蓋詩書禮樂春秋之文皆所以明有而及其所謂無則獨易嘗言之而已然其説也又必寓之爻象彖繫吉凶悔吝之間而使世之學者自上觀之則見其詳乎事物而得其所以有自下而觀之則見其外乎器用而得其所以無所以賢者觀之愈有以自信而愚者窺之亦不至乎疑而得也蓋他心嘗慮曰彼道妙者非中才之所能及彼能及之者又將不言而自諭苟為不度其如此而惟妙之欲言也則是使學者坐而惑之老子者知有無之相為用而以為無者本也故其言詳於無而略於有夫無者無言可也而可以詳言乎彼老子者既以異乎孔孟矣而王弼又失孔子之旨蓋其説以無名也天地之始天神者天地之至難名者也而天下既名之以神矣然物豈有無名者乎又以為常有欲也以觀其徼大欲者性之害者也易曰懲忿窒欲而老子亦曰不見可欲使心不亂苟為有欲矣則將沉溺轉徙喪我以逐物而莫知所守矣又何徼之能觀乎此之不察而曰吾知天地之全古人之大體也吁可笑哉劉仲平曰常名以無方為體常道以無體為用無方者無乎不在無體者無乎不為無乎不為有所可道則非所謂無方有所可名則非所謂無體故曰道可道非常道名可名非常名太初有無無有無名無有無名者太始也太始者天地之父故曰無名天地之始天地者萬物之母故曰有名萬物之母言母則知始之為父言始則知母之為生故上言天地之始而下言萬物之母然而天下之理有道有常道有名有常名所謂太初有無者無而已矣所謂無有無名者名而已矣蓋有無則有名之名矣故無名者天地之始而已而其上又有祖也妙者道之本徼者道之末聖人之妙也觀之以常無聖人之徼也觀之以常有故曰常無欲以觀其妙常有欲以觀其徼妙在中粗在徼言妙則知徼之為粗言徼則知妙之為中故上言欲以觀其妙下言欲以觀其徼蓋天無者對有之無而常無者非無之無而不為有對也有對者無之有而常有非有之有而不為無對也不為無對者非有也不為有對者非無也故常有者真無是已而非無常有者妙有事已而非有故此兩者同出而同歸之玄也莊子曰建之以常無有言之以太一蓋周讀為常無常有常無也欲以觀其妙常有也欲以觀其徼為其欲以觀其妙也故建以常無為其欲以觀其徼也故建以常有若夫徼妙謂忘而無欲觀之則所謂建之以常無有者冥之而已矣夫是之謂又玄而非特同謂之玄玄之又玄衆妙之門玄者妙之體妙者玄之用妙者同出乎非玄也劉驥竊以老子之言道德偶從關尹之請矢口而成言肆筆而成書未嘗分為九九章也後人分為上下二卷以象兩儀之妙用九九八十一章以應太陽之極數令復通而為一二諭之因名之曰通論然心困焉而不能知口闢焉而不能議浩浩蕩蕩不可得而形容其首章始於道可道非常道以明道之不可以情求也末章終於信言不美善者不辨以明道之不可以言傳也難終難窮難測難識仰之彌高窮之益遠宜若登天然似不可及也原其大要不過致虛極守靜篤甚易知甚易行而天下莫能知莫能行以開其兊而濟其事也古之善為道者塞其兊閉其門挫其説解其紛心不散亂安在道中歸乎虛靜之本復其性命之原譬如萬物生於根而歸根也歸根復命性修反德德至同於初復歸於朴與道同體繩繩兮不可名復歸於無物不生亦不滅無我亦無名存亡在己出入無間故隨迎莫見隱顯莫測不可得而親不可得而踈不可得而利不可得而害不可得而貴不可得而賤所以能遺物離人而超然出乎天地陰陽度數之外也大哉至聖神人非此門而莫至知者難言行者目見力少功多要矣妙矣學者當默識而深造之若非深造自得而求之以察索之以辨是猶坐井以觀天豈足以窺道德之髣佛耶趙實庵曰妙道沖虛先天立教至真垂象龍漢開圖師資承化而之三劫運交纏而迄九每於太極方析渾淪天地開而事簡民淳三皇作而制器尚象無機無偽烏有所謂禮儀漸劫漸衰爾乃散乎純朴豈經不作實文未彰至言初授於有虞終成治世金口載傳於姬室大顯玄章雖纍訓於百王又躬傳於關令昔在明皇御注勸家藏之詔文載承徽廟聖言廣吾宗之盛典當時向慕如在始青奕世承休永光有截至于百家箋注壓軸盈車各極其心以詮密意自非明代莫遂遵行實天之未喪斯文宜世也有興乎道尚悲元學久闕疏文故三分以列科庶聽觀之有總敢期妙道幽賜發明將釋此經略以十門料簡初教起因由二序教離合三明宗達趣四天人宗承五三洞所攝六明經殊勝七明道運啓期八明通别九明酬因酬請十依文分判初教起因由傳曰法如乎伏羲而成乎堯歷舜禹湯至周而大備幽厲之後周室浸微至老子時天下蕩蕩無綱紀文章聖人不作處士橫議諸疾恣縱暴兵螫毒民以縻爛老子閔周室凌遲人失性情欲使之還淳返朴歸之太古故作經惟厚忠信尚敦朴薄禮義絶聖棄智使後世之人復見天地之純全古人之大體老子與孔子同時孔子過周問禮諄諄之辭主信與謙孔子區區明言仁義轍環天下席不暇暖而時君世主無能用者則曰鳳鳥不至河不出圖吾已矣夫世以老子在周衰之日不尚高明道德不知孔豫當時明言仁義亦不能振於時哉蓋道者仁義之總名仁義不行又焉取道教起因由其在是矣二序教離合天下之言道者多矣殆不過有三説焉一曰道者虛無恬淡寂寞也一曰禮義法度政治也尚虛無恬淡寂寞者為高明循禮義法度者為中庸夫以高明者為超脫之流則隱於嵌巖宿於枯稿世無所賴其澤是自擯而不用於世也雖天下之大棄之如弊屣未肯以一毫纍於其心超然物外謂之至人以中庸者為治世之士則修禮樂正人倫謹權量制法度世所以賴其為治是行道而濟世者也既涉中庸視上古鴻荒未肯以一言載乎其書處於方內謂之賢人是二者定分之後直若冰炭不相該貫於戲是豈真知大道者哉不思之過爾夫高明與中庸同乎聖人之一道出於聖人之一心聖人全德一出一處無非內聖外王之道也向所謂虛無恬淡寂寞非徒為去世遺纍之學以此三者養正也易曰蒙以養正聖功也隱而未顯故曰內聖興事造業故曰外王虛無也無用而為衆用之祖恬淡也無用而為天下之味寂寞也至靜而為制動之機德全於此出而治天下為可也故物蓄而有禮刻制以為義緣情而制法觀天而為度然後出治之道大明矣初豈不由性盡性則知天性明即通道堯典稱堯曰欽明文思則堯之成政謂之無為無為之功皆本於道是豈道與世特分而為二耶情生於性性裂為情水蕩為波波止為水其實一也若謂高明之道與夫中庸更為背馳非吾聖人作經之意也向所謂不思之過爾老子以周衰道微人失性情故説上下二經語夫大全以救天下後世之失後之人不明其旨分之以為方內方外之學中庸與高明之殊一是一非或去或取三代以還學者多方或居一偏或由一曲不該不偏豈能深明治道哉殆非圓機之聖人不可得而明矣漢文以敦朴為天下先區區僅治晉室以清談而敗俗浸久而亡吾謂道德為難知為難行者以此或者取其書而讀之茫然而不曉以謂非聖人之説豈真知道德者哉然五千言分其用則有三一曰無為之道二曰長生之道三曰治世之道謂大道為虛無而虛無之中有治世之法謂治世為大道而治世即大道緒餘之功至於治心養性金液還丹之方不可一理而推之忘言為盡慮則知上下二經吻合萬法漚和方便無所往而不通者矣三明宗達趣經曰言有宗莊子曰不離於宗謂之天人宗本也序所以順其理故曰語道必有序語道而非其序又安取道先明宗趣然後原始要終也老子作經先道而後德莊子九變先明天而道德次之莊子之言事之序也故先明天老子之言道之序也故首曰道道以無宗為宗無祖為祖聖人作經以因為主所因者道以道為宗道性至玄以常極妙妙極返無故常道無名常名無物有復歸無有無一致既升玄也事理兼忘既入兼忘重玄始顯善惡初分於六對妙觀速轉於無為出則縱橫入而寥閴道之大本實自無為色空存達人之妙觀無事覺聖人之生定語非破妄道必有留祛除未盡則不入空空空空兩無而切防頑鈍謂之清淨須心月以朗明謂之無為存性天而焕若此宗主空虛無物也莊子曰以懦弱謙下為表空虛不毁萬物為實若乃道分宗派性命兩殊性宗則破約歸真命本則深根固蒂從無入有仙人存修練之功自有入無性理契沖虛之地要其極致道本無為欲明宗趣以道為宗虛無為趣今分宗趣别有五對一教義對教説為宗義意為趣二雙明對有無為宗同玄為趣三約己對柔弱為宗自勝為趣四正因對修真為宗長生為趣五神化對敦朴為宗復古為趣四天人宗承道與德同也天與人一也知同而同之則大同知一而一之則大一德知有道則升德而會道人知有天則以人而修天道杳難知人與天隔欲通之者必本於聖人聖人已矣則本之經圖考經而知道則自人而之天得意而忘象則由德而入道太上老君極道之聖人歷劫應化及乎周衰明道德以訓世經之旨以一代所主則戰國之時有小國以下大國大國以下小國之語至乎屢言用兵為不祥之器皆以當世之事以訓時主及言常道則丹青萬世鼓吹百靈垂之無窮者也使道還隆古則返淳而復朴治心養性則返老而還童滌除萬行則微妙玄通天子修之則享太平諸侯守之則鎮邦國卿大夫守之則忠孝士庶人守之則純和方士修之則升真兵家守之而善勝此人道之承流也五三洞所攝如當部以常道常名無為清靜無有入無間視之不見聽之不聞用之不既象帝之先此皆無上大道非色象可緣又言六對不齊寵辱若驚後身外身不爭柔弱則中小之分又治人事天莫若嗇治大國若烹小鮮太上下知有之無為而民自化又近平常道分自修之身及家國天下曰小以之大曰慈曰儉不敢為天下先從愛以及恭用兵以喪禮處之沉機有微明之語如上皆治身之教又谷神不死實腹虛心哉營魄而抱一精峻作而會神恍惚杳冥而有信與夫易知易行而人莫能知莫能行此又進乎九丹長生之訣修練門中係上乘分由是則誰能定指其宗乘耶今詳味此經言命有事有理該貫總攝互相包含謂之頓而非無頓也謂之漸則漸亦兼言當此經性命混融自為圓教酬因酬請則尹喜為宗無論無誦總契經分大率道之一字已極虛玄至於修真養命鍊氣養神雖同超證之門大存制死之術固常融命理而入道證極道而無為故諸經則制命為先窮極五行變化六明經殊勝語道之大必師其全語神之功必主乎變苟以道為虛寂魂處滅亡木石同軀禽蟲類性豈能通其變邪諸經出乎道而三乘互差一性昧其筌而多岐競裂故示無為以不言闡長生以關鍵椎五行於隱伏辨藥石於寒溫明運度於興衰禁邪異於符籙經圖誥訣别趣殊宗雖同真一之門未躡混融之理較量殊勝豈類本經略舉勝因明十六種一以常而盡萬法二以玄而同有無三以示又玄為衆妙之門四以無為為有為之體五以不勝為大勝六以無樂而言樂七以有數而隱數八以大寶為神器九以退為進而用兵十以言無事而定天下十一以復季世而還隆古十二以大似不肖物咸歸之十三以抱一為治身治國之道十四以簡略而包羣經十五不言性而性理咸著十六總包道德性命而一一證實以兹研究諸經理趣豈比大同妙用神工烏能備舉七明道運啓期天運靡常得乎時而道斯興矣大道無數同乎人而數所係焉粵自五劫晦明元尊撫運三皇已降歷代宗承或去取之因時或興亡之在事粵若軒轅稟籙夏禹傳符堯舜授經周朝顯迹秦王漢武探求不死之方竇后孝文篤奉真元之教唐尊聖祖學舉玄綱逮宋徽宗淵衷湛淨睿智光輝受帝心祕密之言續道祖將殘之命範傳金籙宫敞神霄製飛天法輪道藏之文訓混元皇帝道德之旨廣開元學詔簪褐以三舍之科寵示道宫賜掌教以近臣之秩至于天文寶籙詩頌符圖皆萬世之所未聞向一時而鋪張遽出人莫可議事是非常只因頽運之交疑有清談之失曾不知劫傳有日教亦待時漢祚隆而河上談玄唐室興而老君示現世將成治道不虛行益增蘂笈之光當復太平之序度人曰四萬劫傳莊子曰萬世一遇欲求玄解姑用筌蹄披乘之人無忘大教八明通别凡經有通别通謂通序别為别序通序者論一經之大旨别序者經義逐章開陳若度人經前序後序中序有前章後章而隱語不在三章之類今當部若論通别當以道德為通八十一章為别九明酬請酬因酬請者當部經首無爾時老君在甚處為甚人説如無因請若考之經傳老君為關令尹喜説又云先為帝舜説今直指中周老君為喜説因為性命之本大因緣事也酬則酬喜臨關遮道邀駕請求妙訓是亦因請明者按西升經關令尹喜見氣齋待遇賔為説道德列以二篇其事詳矣十依文分判經分三分謂序分正宗分流通分當部首無請問之語是缺序分末無信受奉行之語是缺流通分今特取葛仙翁序語為序分八十一章為正宗分道德推行於世為流通分又按靈寶經發題云凡經以極果為序以因為正以悟為流通邵若愚曰道者以無為顯實有為特權即有明無悟無却智此理也德者體道為法而施於事此事也道德二字包含而無所不至所陳階梯次第緣道有淺深德分內外若不明階梯罔純互謗夫大道者寂然至虛無形無名而不可言其為書者無以記之故曰大易大易者未見氣也大易動則始見一氣之初故曰太初老子指一氣強名曰道孔子曰形而上者謂之道釋氏陳四諦亦曰道故知三者垂教總備於有也若不從有焉可以無明無以有明無故道有淺深爾大易者虛無也因動為有之初故曰太初有氣為形之始故曰太始氣形相合而生剛柔之質故曰太素氣形質具未相離之間名曰混沌混沌既分陰陽相蕩一氣居中萬物生焉故老子曰道生一一生二二生三三生萬物是故聖人仰觀俯察體天尊地卑用之則為官長而明王道立五常百行以正君臣父子夫婦之制以治人理夫大道者無名無迹無死無生萬劫長存而不變易尊高無上妙不可言夫上德者體無為為用以一為法而治天下萬物作而不辭生而不有為而不恃功成不居下知有之而不見寶萬物將自化所以無敗無失者蓋為無為則無不治矣若失之則執一而徇有為而為內德夫下德者體一為用以陰陽為法而治天下故孔子一以貫之善建者得一為正萬物將自賔若夫一則徇五常百行於事而為外德夫內德者抱一也蓋一者國之母生之根抱一不離則根深柢固乃長生久視之道孔子謂之至德而以道為本也又名中庸者喜怒哀樂未發心在陰陽之中釋氏謂之中道玄門失之則殢陰陽潛運而為法術夫外德者從五常百行修於身孔子謂之敏德而以行為本也處柔弱不爭若水而攻堅強如慈儉若拙訥之類皆是也失之則殢智巧華薄騁強梁馳田獵而貴貨居寵辱矣夫道甚易知甚易行而人好徑故其出彌遠其知彌少大道平易而在不為而成以要言之皆歸無欲不欲以靜清靜為天下正老子不言藥不言仙不言白日升天者止言道德而非術也道德真經集義大旨卷中
