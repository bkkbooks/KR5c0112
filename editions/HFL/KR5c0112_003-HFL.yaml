body:
  text: 凝遠大師常德路玄妙觀提點觀事月屋劉惟永編集前朝奉大夫行太府寺簿兼樞密院編修官石潭丁易東校正程泰之意總明總上世之尊老氏者曰聖智仁義治之有具者皆不出乎下形而器者耳老氏也者據道本而涖器原則是五三六經皆當受其覆冒也及其有疑於老則又異矣曰天下所恃以治者仁義禮樂刑政如農人之耒耜工師之斧斤也無是器則無是用使聖智仁義而可去也則是徒手無操而望天下自治古今必無之理也此二議者皆自主其見而不能參言道器之本末者也若使道不藉器則老氏所主當專於無矣然而兵刑税貨舟車械用凡道之品器者悉將資以爲治則是未嘗或能遺有也不能遺有則是聖智仁義故在也安得而云空不適用也若曰道之上乎形器者必待老語與之開明則夫闡太極以立乾坤造書契以生禮法開闢以來未有能先易而言者矣道若器固皆在易而何所待於晚出之老氏也則夫尊老氏而謂上乎五三六經疑老氏而謂其空虚無用皆不得爲知老氏者也乃若老氏之高致則有在矣知道之奥而談無曲盡其妙運器以道而在有不局於有凡六經主於紀迹而不暇究言者此書實皆竭告也則論孟之所務明者於此乎加詳矣是故其書得與六經並行也明總下或曰聖賢談道本以明世也苟如若言則是有懷不盡也曰是有兩說也其人未可與言而與之言則徒言也吾意欲致而言不能既則又能姑發其端而已也且如人心道心之合固有中矣而精一之理非堯則不能以授非舜則不能以受也是豈容人人得預也一貫之道惟曾子能出一唯而子貢不能也四時之行百物之生子貢雖得聞之而亦不能有復也至其性與天道隱於文章之中則雖子貢初年亦遂不得預聞矣凡此之類是皆六經論孟不嘗究極者也若夫老氏寫其超絶之見以期萬世而一遇大聖焉則所期者遠故不待親見可受之人而後始以其語授之也是故天地所始造化所起道德所底皆窮根極以暢達之立等級以次比之故儒之探妙資詳者非是則無即也課其功用豈獨不戾於儒哉是直儒倫之大助矣若能平心以觀識其矯而要其歸則三聖易藴固已披展言下自詩書以往其襟要益當總是矣有無以形而言有無則自未爲天地以上皆可名以無既爲天地矣不以人物事爲器具則皆當名以有也此以其形而命有無者也世人聞老氏貴無而疑其表裏之皆無形體也則固不適於用矣豈知老氏之謂有無也者道器交相輸載而不可泛以形求也哉且夫混成也玄也又玄也其深至於不可見聞搏執則其爲無也極矣而天若地方且由之以生則此之一無豈不槩函萬有也哉及其出而爲有也天地之産是爲人物而人物皆藴元氣也大道之派是爲德仁義禮而德仁義禮皆函大道也則凡云萬有者又皆分載混成之一無也於此致察而後始見有無之本末也是故易之肇言大道也亦慮夫世人不知本末之相須矣於是合道器以爲一初而隨所形見以名其出也故其形見而上者則名之曰道形見而下者則名之曰器上下云者猶曰一物之内有升而在上降而在下者且非可析升降以爲兩體也火之在薪也其上騰而虚者爲焰下著而實者爲炭焰炭也者正從一火而分升沉焉若曰上騰而焰者爲火其著下而炭者不得爲火則人人知其謬誤也此於道器上下之喻最其切近而易見者也老子祖易以言道而皆變其稱謂故道器之名轉爲有無而上下之名變爲妙徼此特欲自立己則以示無所師承焉耳其理則無彼此之異也妙徼云者亦並上下之語而借一物之表之裏以分諭器道焉耳也凡物之已有體質者與夫事爲之已有迹狀者無間乎泰山之與秋毫範圍之與灑掃上必有下裏必有表則是道器未嘗相離也然則老氏之貴無也以其在本而該也非樂其空虚也及其賤有也亦惡其處有而拘焉耳矣不曰一涉有具而遂不爲道用也有中之無上即形而分有無則凡在道者爲無在器者爲有其别尚易以見也及夫道已爲器則有體有質矣體質具而眞無不可復見矣今謂老氏而能主無運有也則夫體質之中於何取無也曰有中固自載無而此之無也最其難言也顧夫事事物物之中其虚實悉常對立則夫人而可與知也實者即其體質也虚者即其不著體質而能御此之實者也故夫實中之虚即有中之無也老子蓋嘗明表此理以示人矣其要語曰三十輻共一轂當其無有車之用故有之以爲利無之以爲用夫車之所以可運者以其輻轂之備也則輻轂之在車也正其有焉而實者也至於發軵輾地乃在輻轂體質皆無之外則其用不屬乎有而遂屬乎無矣是理也即有能載無而無能運用最其可證者也故老氏遂以此理傳之人事而用以發明其教也其曰有之以爲利者猶曰營而致之以足其具也無之以爲用者猶曰殺而損之以致其用也其具已足而無以運之則其車亦不能以自行故輻轂者車之得有也而車所從運則非車之所有也非車所有則宜乎其命以爲無也此老氏求以無之而始爲已用者也是爲老氏超有用無之則也故雖道之形見乎器者每下愈實如兵如刑者則亦不屑與明也是故恬淡慈哀兵之則也恤賴民生待其自重而畏死然後取不悛者以致戮示戒是其用刑之則也夫恬淡慈哀豈其干戈殺伐之所有歟而夫無狹其居無厭其生者亦非刀鋸斬刈之具所嘗與謀也老氏乃取二義以冠兵刑之上則其主無運用之理昭乎其可明者也究其極致是且出兵言兵超刑言刑使兵刑反爲我用而我常不爲兵刑所束是然後得爲老氏所貴之無而非世人指爲無用之無也有中之無下是理也豈惟老氏言之孔孟亦嘗言之矣曰聽訟吾猶人也必也使無訟乎曰仁者無敵夫兩造交攻乃始爲訟兩軍相加乃始爲敵有訟有敵而後兵刑生焉顧欲即其所從生者期以虚而無之則凡世之所尚謂夫片言可以折獄而約戰期於必克者借使曲盡能事亦非體道者之所尚也何者不能超出其表而局束於其内故也運甓者其身必在甓外而刺舟挽舟其操縱所施悉不在舳艫之内是故用力少而見功多也是亦老氏資有於輻轂而遽欲損而無之之義也雖然此特即孔老之言兵刑而參配其有無爲則如此而已耳孔老又嘗即器物而言運有之無其理尤爲曉白也孔之言禮樂也曰禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉甚言器物之不足以盡禮樂也禮之有敬也非玉非帛而玉帛不得此敬則不能成其爲禮也樂之有和也非鍾非鼓而鐘鼓不得此和亦不能成其爲樂也則皆實必資虚之謂也以較老語則鐘鼓玉帛者車之輻轂也禮樂之用故皆資器物以自見而器物之不能自成禮樂正與越出輻轂之外乃能使車之功用效乎運載者同爲一理也且夫老氏推無爲之妙達諸治國而自詭結繩之可復也則宜其翻變禮法而别爲一撫矣然嘗詳求其以則凡舟輿兵甲什百之器儼然五帝三王之具也而敢自負以上乎六經者蓋曰吾道有高乎形器者焉吾將矯文以樸鎮天下以無事待其安俗樂業重死而不遠徙則凡此有具之屬雖可以爲用而遂可以付諸不用也比其用無之理全與儒應特其立教不同故著語互分彼此耳若使老氏始循大易本語仍用大易故名而正爲之言曰吾其尊道而卑器也吾其運道以役物也則人將不復疑議矣惟其變道器以爲有無而人不知夫無中悉嘗藴有也故貴無之語遂幾於徒手坐視而冀其事之自成焉耳則安得不相疑議也大昌既發此理矣聞者或不以爲然試於讀老之際以道易無以無想道則無之可貴其理自明其疑自釋矣用無老氏之即有用無者其别有三而皆不出乎集虚以化實也挫鋭解紛和光同塵滌除玄覽寡少私欲則求以去夫害虚者也沖其盈而不極閟其神而不示辭其成而不居則求以體此之虚者也至其操虚實之柄以制有無之則則於剛柔之用最爲該貫而明著也蓋剛之爲道欲達而直達無所回隱則其象實而塞也柔之爲道待唱而應順而不爭其中實行斷制而廉稜不露於外則其象虚而通也故通者可以運塞而柔者常能勝剛也凡其知雄守雌欲奪而乎欲先人以其身後之則皆惡剛之塞而體柔以行其虚者也亦其求以反物而終致大順者也及其通且虚者爲之而成則行焉而無轍迹無爲而無不爲者是其效也方其運實主虚人皆不可得見及其效成於虚而後始驚其神則易之不疾而速不行而至者又其則也故自言其總則曰弱者道之用隨言其所從用弱則又曰天下之物生於有有生於無也用無成敗貴無之道古今固有寳而用之者矣而或以之成或以之敗太王去邠與徐偃王不忍驅民以戰是一類也漢元優柔與文帝元默亦一類也而其成敗大相乖戾故後世執迹以譏其不成者而曰結繩不足以救亂秦舞干不足以解平城也則并與老語而懠諸無用顧不知罪其施置之失當則豈其知言也哉列子設爲向國二氏致富之說而明夫同意向而異成敗者則曰向氏喻國氏致富之言而不喻其致富之道則遂反爲身殃也其意正以況此也八十一章固皆本柔爲用矣而其所從用之則濟寬者有制紏弛者有猛暗行乎其間也是故迷民之舍正而入奇也則方廉直光實嘗交出而行制御也豈其有柔無剛也歟民皆賴生而畏死矣猶有敢於爲奇者且將執而殺之則威當克愛者斷斷乎其無貨也又如自夸其器之利而主其勝之可必者歙弱廢奪姑其蓋之以柔耳非專於柔也故凡世之慕清虚而隳事功者皆其守雌而未嘗知雄者也則凡無古聖人之德以求爲結繩舞干之事者無往而不及於敗也道等易分有無則道器兩語而已而老之有無等級則甚多也自無以上有玄有又玄乃爲衆妙之門而常無者特可循以觀妙而已若夫總衆妙而出之則必屬乎又玄也自玄以及又玄即上乎道而爲自然者是矣自然云者莫之爲而爲其在天下自賔自化自正自富而不知帝力何有者是其效也故老氏而敢鄙薄聖智者主此地以駕其高也由道將爲德以後能常其有而不自入於有者一也象也樸也之三名者是其總也自此而出爲天地造化爲仁義禮智信則皆德矣而五常之中每一德者又自分上下也上德之品既極乎上而又有深於此之上德者焉則又加玄以冠其上而曰玄德也牝之玄牝同之玄同覽之玄覽亦其類也則名雖在德而其實已入乎道矣其詳如此故言六經論孟者率來資焉信非苟爲虚尊也試舉孔孟談仁之一端以與老語對明則知儒語雖有分際而其所立等級未及如老氏之察也蓋孩童之愛其親與並井而救赤子固皆可名以仁矣而九合一正者乃反未得確名爲仁也此在孔孟雖有分際而亦未暇明立等則也至於博施濟衆推之可極於聖而子貢尚疑其未能充盡仁理也爲其等級差少而未達者不能確定其則故也故六經孔孟必資老氏者其槩皆類此也此非抗老而抑儒也老語主無故能於道等加詳也若易地而觀則儒語之詳於涉世者至老氏而又疏略之甚也蓋所主異向則所言隨以詳略其勢使然非有彼此之異也若夫老氏之無其當資藉六經之有者則又人人知之不論可也道序下學而上達踐迹而後可以入室也有初有終確乎其序之有定也世人待老氏太高曰道之涉器者老氏不談也故凡其言之方及學益者則皆引而致諸損己及無之後故書指所及遂爲表裏皆無之無而不能爲無中函有之無也儒老言道皆以道之及化爲聖賢機要然究其化之所由致則皆有有可損乃能化有及無也即此理而椎之灼其可以見道矣損之始乎學益也如炊秫傅蘖以爲酒醴也及其及成則秫糵變而甘滋見是固化有及無之象矣然而古今嘗有不用秫糵而徒水可以自變者乎若淺秫稻之爲窒塞而遽求五齊於徒水則猶未致學益而躐從損始是爲不用秫糵而能憑空出化也益之未致中不充實則用何爲地以受此損也諸如此類大昌皆隨淺深而别言之世必有議其淺者矣而其敢於自信者參會六經孔老而見其無不契合也正使老氏復起此言亦當不易矣天人凡言有無不過兩塗大道所居則杳冥昏默是爲無矣自無而有自有而化仍復於無則其有無之一也道學益損也者始乎有而終乎無則又有無之一也前之有無則託諸陰陽生殺既已爲物物又復歸其根者是在天之有無也及其著諸仁義禮而爲德德之玄者復合乎道則在人之有無也二者同出一本而其形見之地則不容槩同故老氏之語亦有不分天人而於天人之有無混而言之者知其本一而不必以彼此爲間也明矯老氏之絶棄聖智仁義深知其以者曰此特矯耳非其本心也而古今率多咎之爲其迹與經戾也然而聽言之道以其事觀之則實理著見不可誣矣易十三卦之尚象制器有曰垂衣裳而天下治蓋取諸乾坤也者是黄帝堯舜皆嘗相爲創承也然則聖智也者黄帝亦居其一矣老氏援黄帝以主其教而凡古之聖智槩取而譏之則夫黄帝也者亦在棄絶之數矣豈有同是一人其道可師而其法乃可棄絶也耶以老氏之事言參而求之則其矯而非實也亦昭昭矣至莊子推大其教又從而廣之曰剖斗折衡而民不爭也此語尤其累老教而致譏誚者也然而其中有理焉又可以自用其說而自明其矯矣結繩之制老莊二子皆相與力主以爲己教之嘗效乎古者也然而結繩也者何自而有也得非人我不相保信而未免假物以防詐僞也歟使其淳樸全在而無姦欺則亦何所事乎結繩也椎此意以求之是殆欲造書契而智未之及者耳夫惟淳古無法之世尚不免資信於結繩而謂人僞已極法所不能誰何者乃欲盡去其具而冀其爭心之無也其勢非使老聃爲君而尹庚列莊與之爲民則决無可措之理也故莊子自傷其矯已甚而又於篇終自爲之明曰周之辭荒唐而說謬悠也所恃以無負於道者終能反諸宗本而調適上遂至此乃爲情實之語也世人槩指老教以爲虚無者皆循其荒謬致矯之初而不知求諸調適上遂之後也孔孟之生略與老莊相先後凡其放言無忌憚者孔若孟必次第見之而無一語與之對辨知其異者無害於同也不然則楊墨仁義其差於六經不能以寸而孟子究推其弊以爲且將入於異類而獨於二子棄絶之論若未嘗聞耳者殆皆究其宿而不責其初也哉孔老易理之散在六十四卦者至繫辭而後會集于總也今通考老氏一書凡其說理率不能外乎繫辭而别立一撫也揣切其情大似資根株於易而摭枝葉於上下繫也列莊二子共尊其師乃曰孔氏嘗即老氏而北面焉載詳其意是殆疑人之有議乎此而故爲夸高以行掩蓋耳至唐而後韓愈氏出焉嘗忿其語而著諸原道以咎誚夫儒徒之不能致辨也是固不失其爲衛道矣如大昌所見則不然使其有合於道則道無二致安得而不相襲也既不嫌於承襲則亦何間於彼乎我也故孔之於老師與不師不足較也孔氏嘗曰晋之乘楚之檮杌魯之春秋其義一也其事則齊威晋文其文則史其義則丘竊取之矣又曰三人行必有我師焉擇其善者而從之苟孔氏而嘗師老則雖親聞二子之語亦必無忤也使老氏反來取法而能以吾法翼吾道則其徒偏敬己師過爲椎尊亦何害其爲吾黨也故師與不師其語可以付之不辨而有不容不辨者也孔氏受萬世尊信以爲道德本祖者以其集聖智大成縱心所之亦不踰矩也今其設老語以形孔子而曰驕矜睢盱屏除未盡則是有時乎而或遂喻矩也則安足以訓式無窮之來世也是於事害而體妨也大昌爲此之故遂究其語而窮其已乆久而後有見乃知二書凡語道序率皆借孔顔所造以爲淺深之喻則夫三子之尊孔氏也其已至矣而其夸語皆非眞確也蓋列氏設爲顔氏之坐忘也以較孔子則其所得當在耳順之地而在老教則爲益己及損者也莊子設孔顔相語而曰回吾與汝交一臂而失之則是能損而未能及無也又嘗設顔子自道而曰夫子不言而民趨無器而民滔乎前回不可及也夫子奔逸絶塵而回不能追也則損之又損而及乎無爲無不爲者惟孔氏而後足以當之此其等級蓋可考甚明也豈有盛德外著既已不言而信無益可損乃有睢盱驕夸之可議哉則其書之於孔氏或抑之而又揚之率嘗兩致而示意焉所期乎聞一者之反三也故二子交詆孔氏而能無違於道者凡皆此類也本易老語皆易出也而獨變其名稱以示無所師承而求别成一家焉耳無名天地之始即太極能生天地而未肯爲物者也常無常有可觀妙徼則又道器之形而上下者也一生二二生三三生萬物即天地之與絪緼爲三而萬物以之化生者也作復之相更其出於谷神橐籥者即消息盈虚遞爲屈信者也不敢爲天下先即羣龍無首者也襲明襲常是顯仁而藏用者也此其大致然也其播而散小者不勝言也若夫絶棄聖智仁義而黄帝仍在所師則聖智何嘗棄絶也功用莫非剛柔即剛柔之所疑安得不爲仁義也是仁義日常爲用不須臾而離也用此理而通之則五經論孟之在老語者名變而實不變觸事皆是也道德經書之分卷以爲上下而總其名曰道德經者王弼所傳也大昌意此之總名所從來者古也凡今本分標道經德經者則恐後人爲之蓋上卷亦自言治言兵下卷方且論一論道論無論柔自足以見道德之不可分二也分章名章八十一章每章各摭首語以標次先後此則或出於後人矣而其五千言者之嘗爲八十一指則必出於老氏也夫其每章著語有曰故者曰是故者曰是以者率皆求以通貫上下脉絡使語省而意全也夫其每章之語既有更端而一章之中指意又相聯屬理以明也而釋其義者乃遂句爲一義使此句不可通之他句章爲一說使此章不可致諸他章則老意法不其然也若夫標章之名自王弼已下凡所名章與今傳本皆同而河上公遠出漢初所名獨異若老氏親嘗定著則必無如許異同也類例老氏書指固其至虚而難搏執矣然大昌嘗熟復前後則皆有類有例交相來發也此章之語啓其端而不竟則後章必有别語以終之故大昌之立訓皆明其彙會其散而宿之於一始知老氏雖主於談無而其部分乃如周官六典有凡最巨細偏全遞相灌注條條可以審覆也則豈同子虚非有之假設也哉謂老語爲中空者試於此而思之離隱老氏以高世之見能測道奥固嘗罄其有以言之而亦小使意盡言下也於是有離隱之體焉何謂離曰本一義也而散其語於數章不一章究極也何謂隱曰言其然不言其所以然期夫人之深未而自得故其話言所著如連山斷壑離離乎相絶而相貫也說者不悟遂至於章分句裂而其理散漫不全矣孔子曰舉一隅不以三隅反則不復也正離隱之謂也故大昌於反隅者不敢不力所期不入於破碎而已也世之訓老者率多務出傑辭奥說濟其深而晦之及其甚也有如廋辭隱語又如後世釋氏之談禪讀者至不可曉大昌亦不能究極其當否也獨聞古語借繪事以譏世習而曰畫工喜爲鬼神憚爲狗馬也以狗馬之工拙可較而鬼神冥寞難辨也大昌惟此故凡有此訓率皆明白其辭而證以人事達諸成敗其說誠當則固善矣若其末也或能以道釐正則亦志道者之本願也若欲借晦爲深自匿於不可致詰則曷如勿爲也哉列莊古無訓傳苟其欲述前作則别爲一書以明之故列氏莊氏二書正爲五千言者立爲義䟽也老氏之語簡嚴而不舒放離隱而難遽解此二子者則皆敷繹而會輯之蓋有敷繹太過而言涉於誕者矣而其合散明斷則若道若器悉有歸宿也以二子之所釋而槩他人之所釋則夫喜爲鬼神而不嘗眞識鬼神者多矣大㫖序跋易言天玄又曰神也者妙萬物而爲言者也蓋玄者天之正色神者陰陽不測之謂老子以徼妙爲玄玄之又玄豈非衆妙之所從出乎蘇子瞻作衆妙堂記始因睹灑水薙草者手若風雨步中規矩而歎其妙繼又以蜩之蜕鷄之伏而形容道之眞妙彼庖郢之技得於習而非徑造也孔子以魯昭公之世適周老子曰子亦得道乎使道可以獻人則人莫不獻其君矣道可傳人則人莫不傳其子孫矣然而不可者中無主則道不可得也聃爲周藏室史有子曰宗仕魏爲將數世之後孫之雲仍曰解仕漢爲膠西王太傳老子非不仕也非無子孫也玄妙之教既不獻之於君又不傳之於子孫豈非周衰大道將隱著書垂世惟關令聞之中無主者皆不可得而聞歟漢文帝在位二十三年躬修玄默專務以德化民可謂兼衆妙而得之矣河上公示其神變坐躍騰空止於玄虚以是爲玄豈老子之所謂玄乎史記與漢書皆不録良有以也常德路玄妙觀提點劉月屋類集道德經解鋟梓以爲教門傳遠之光蓋有志於思玄者也故歷叙所聞以生之俾證諸名世之君子元貞丙申孟冬既望以齋居士巴川陽恪書于辰陽擬盤寓隱昔吾老子流傳道德經于世玄理幽深非特啓教度人而已累代明君鴻儒莫不箋註研窮其妙亘古今傳之無窮凡道家者流誦其正經猶恐未明其㫖非參合諸家之註豈能深造玄微哉惟永抑嘗探其祕藴莫盡其要每專心致志蒐羅百家之註究諸妙義欲編爲集義而與同志者共今得石潭丁編修以其家藏名賢之註與惟永所藏之書合而爲一乃總八十一章爲三十一卷第繡梓之費浩大非獨力所能爲遂與徒弟趙以莊劉以鑒持疏徧往各路叩諸仕宦君子及知音黄冠捐金共成其美今經一十餘年凡寢食之間未嘗忘焉經之營之今已告成每自披閲玩味允謂精妙玄之又玄者也若帝王公侯遵之則國治天下平卿大夫守之則忠君孝親士庶人佩之則復歸於淳樸吾道體之則超凡入聖曰道曰德先天地不見其始後天地不見其終其此經之謂乎凡我同志受持者幸毋忽大德三年歲次己亥上元日晚褐劉惟永謹跋老子一書無非欲法天正以天法道道法自然其曰萬物作而不辭生而不有爲而不恃功成不居大同小異凡四言之第二第十第三十四第五十一此老子心聲之發也蓋天不辭作成萬物然而生而不有盈天地間皆生意何嘗自有其功爲而不恃盈天地間皆所爲何嘗自恃其能功無不成成而不居此天道也曰不爭曰不見可欲使心不亂曰清靜爲天下正無非法天故我無爲而民自化我好靜而民自正我無事而民自富我無欲而民自僕此其無爲之效驗也欲釋老子之書者舍法天舍自然舍清靜無爲未見有可措辭故愚欲專以此而釋老子或謂得其意一日玄妙提點劉月屋將石潭所作老子解示余欲余復下注脚余曰吾潁祖已於是書用其力矣坡祖嘗稱之使戰國有此書則無商鞅韓非使漢初有此書則佛老不爲二程泰之亦服其善余安能復出高見卓識求以過吾潁祖哉月屋曰義理無窮曷於是書探訂則將見如水之源源而來余却之不能黽勉求之積日書成謂其備全秩可也謂其能繼潁祖之後塵則不可謹叙于此庶使觀者得吾意而不罪其僣戊戌重陽日前進士敬靜蘇起翁跋道德經五千言註釋百餘家眞知太上之心者誰歟歲在至元壬午道厄於時經燼於火惟五千言巋然魯靈光之獨存豈非天耶黄冠之徒朝吟夕諷間有未知句讀者僕私切歎之不避僣躐爲正其訛而析其義時與石潭老師音問往來無虚月因索及之遂録以寄老師一見稱奬辛卯僕忝與歳貢以易老二書進呈得闕古邵丙申之夏常武寓公趙君貫道來正學綱袖示老師月屋二書垂諭新刊道德經集註以俚說儕之諸說之後復以化疏見委僕爲之驚愕而繼之以媿且病也僕已鋟梓似難反汗己亥夏僕冒暑訪月屋則所刊板工力尚欠三分之二而石潭老已爲古人矣感慨之餘僣以木鑽石盤磨磚成鏡之事課爲古體勉其硬著脊梁成此一大公案人之所欲天必從之是經之幸存者天也諸說之會于一以傳不朽者亦天也人欲違天得乎愚故始終得以歸諸天臨行月屋索跋語因以是說贅于卷末是歲之秋七月長沙喻清中跋道德經大包天地細入毫芒辭甚約而理甚博玉笑金鑰豈造次所能抽啓哉古今註詠紛如非不各有所詣往往得此遺彼如八音異奏而不能至乎大成月屋劉惟永取五千文爲三十一卷集註七十有八氏奚翅萬億言若仙若儒若釋若隱若顯以至鸞筆恍惚微妙之辭亦所不棄一繙閲間如入寳藏金貝珊瑚象犀水銀丹砂青芝玉札錯落萬狀富矣哉所謂集大成者非耶噫是經非關尹一見不作尹之功大矣劉之功當不在尹之下雖然太上以無爲爲宗誦是書者由七十有八家萬億言得五千言由五千言得一言由一言得無言焉猶龍老仙得垂手乎太空引而上之曰孺子可教大德庚子八月既望嗣天師大素凝神廣道眞人張與材跋道德眞經集義大㫖卷下
